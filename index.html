<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegrom</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:white;
}

.app{
  max-width:800px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:18px;
  background:#151b33;
  font-size:24px;
  font-weight:bold;
}

.login{
  padding:20px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:12px;
  border:0;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  margin-top:10px;
  padding:14px 20px;
  border:0;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:#38bdf8;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg{
  background:#1d2747;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}

.name{
  color:#38bdf8;
  font-weight:bold;
  margin-bottom:4px;
}

.time{
  font-size:11px;
  color:#9ca3af;
  margin-top:6px;
}

.send{
  display:flex;
  gap:10px;
  padding:15px;
  background:#151b33;
}

.send input{
  margin:0;
}

.send button{
  margin:0;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">💬 Telegrom</div>

  <div class="login" id="loginBox">
    <h2>Введи ник</h2>
    <input id="usernameInput" placeholder="Например: Nikon">
    <button onclick="saveUsername()">Войти</button>
  </div>

  <div class="chat" id="chat" style="display:none;"></div>

  <div class="send" id="sendBox" style="display:none;">
    <input id="messageInput" placeholder="Сообщение..." onkeydown="handleEnter(event)">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const db = window.supabase.createClient(
  "https://xflrmkcashrosgmsyxeg.supabase.co",
  "sb_publishable_AAUgqla1G4Xi4N0vk2B9jw_Eg-yj1Jm"
);

let username = localStorage.getItem("telegrom_username");
let refreshTimer = null;

if(username){
  startChat();
}

function saveUsername(){
  const input = document.getElementById("usernameInput");
  const value = input.value.trim();

  if(value.length < 2){
    alert("Ник слишком короткий");
    return;
  }

  username = value;
  localStorage.setItem("telegrom_username", username);
  startChat();
}

function startChat(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("sendBox").style.display = "flex";

  loadMessages();

  if(!refreshTimer){
    refreshTimer = setInterval(loadMessages, 2000);
  }
}

async function sendMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!text) return;

  const { error } = await db
    .from("telegrom_messages")
    .insert([{ username: username, message: text }]);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  input.value = "";
  loadMessages();
}

async function loadMessages(){
  const { data, error } = await db
    .from("telegrom_messages")
    .select("*")
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  renderMessages(data);
}

function renderMessages(messages){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(addMessageToChat);

  chat.scrollTop = chat.scrollHeight;
}

function addMessageToChat(item){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `
    <div class="name">${escapeHtml(item.username)}</div>
    <div>${escapeHtml(item.message)}</div>
    <div class="time">${new Date(item.created_at).toLocaleString()}</div>
  `;

  chat.appendChild(div);
}

function handleEnter(event){
  if(event.key === "Enter"){
    sendMessage();
  }
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
