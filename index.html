<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegrom</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:white;
}

.app{
  max-width:850px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:18px;
  background:#151b33;
  font-size:24px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small{
  font-size:13px;
  color:#9ca3af;
}

.login,.user-panel{
  padding:20px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:12px;
  border:0;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  margin-top:10px;
  padding:14px 20px;
  border:0;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:#38bdf8;
}

button.secondary{
  background:#334155;
  color:white;
}

.chat-title{
  padding:15px 20px;
  background:#111827;
  display:none;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:none;
}

.msg{
  background:#1d2747;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  max-width:75%;
}

.msg.me{
  margin-left:auto;
  background:#075985;
}

.name{
  color:#38bdf8;
  font-weight:bold;
  margin-bottom:4px;
}

.msg.me .name{
  color:#bae6fd;
}

.time{
  font-size:11px;
  color:#9ca3af;
  margin-top:6px;
}

.send{
  display:none;
  gap:10px;
  padding:15px;
  background:#151b33;
}

.send input{
  margin:0;
}

.send button{
  margin:0;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <div>💬 Telegrom</div>
    <div class="small" id="currentUserText"></div>
  </div>

  <div class="login" id="loginBox">
    <h2>Введи свой ник</h2>
    <input id="usernameInput" placeholder="Например: nikon">
    <button onclick="saveUsername()">Войти</button>
  </div>

  <div class="user-panel hidden" id="userPanel">
    <h2>Личные сообщения</h2>
    <div class="small">Напиши ник человека, которому хочешь отправить сообщение</div>
    <input id="friendInput" placeholder="Например: vasya">
    <button onclick="openPrivateChat()">Открыть чат</button>
    <button class="secondary" onclick="changeUsername()">Сменить мой ник</button>
  </div>

  <div class="chat-title" id="chatTitle"></div>

  <div class="chat" id="chat"></div>

  <div class="send" id="sendBox">
    <input id="messageInput" placeholder="Сообщение..." onkeydown="handleEnter(event)">
    <button onclick="sendPrivateMessage()">Send</button>
  </div>
</div>

<script>
const db = window.supabase.createClient(
  "https://xflrmkcashrosgmsyxeg.supabase.co",
  "sb_publishable_AAUgqla1G4Xi4N0vk2B9jw_Eg-yj1Jm"
);

let username = localStorage.getItem("telegrom_username");
let friend = localStorage.getItem("telegrom_friend");
let refreshTimer = null;

if(username){
  showUserPanel();

  if(friend){
    document.getElementById("friendInput").value = friend;
    openPrivateChat();
  }
}

function saveUsername(){
  const input = document.getElementById("usernameInput");
  const value = input.value.trim();

  if(value.length < 2){
    alert("Ник слишком короткий");
    return;
  }

  username = value;
  localStorage.setItem("telegrom_username", username);
  showUserPanel();
}

function showUserPanel(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("userPanel").classList.remove("hidden");
  document.getElementById("currentUserText").textContent = "Ты: " + username;
}

function changeUsername(){
  localStorage.removeItem("telegrom_username");
  localStorage.removeItem("telegrom_friend");
  location.reload();
}

function openPrivateChat(){
  const input = document.getElementById("friendInput");
  const value = input.value.trim();

  if(value.length < 2){
    alert("Ник слишком короткий");
    return;
  }

  if(value === username){
    alert("Нельзя открыть чат с самим собой");
    return;
  }

  friend = value;
  localStorage.setItem("telegrom_friend", friend);

  document.getElementById("chatTitle").style.display = "block";
  document.getElementById("chatTitle").textContent = "Личный чат: " + username + " ↔ " + friend;

  document.getElementById("chat").style.display = "block";
  document.getElementById("sendBox").style.display = "flex";

  loadPrivateMessages();

  if(!refreshTimer){
    refreshTimer = setInterval(loadPrivateMessages, 2000);
  }
}

async function sendPrivateMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!text) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .insert([
      {
        from_user: username,
        to_user: friend,
        messages: text
      }
    ]);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  input.value = "";
  loadPrivateMessages();
}

async function loadPrivateMessages(){
  if(!username || !friend) return;

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("*")
    .or(
      `and(from_user.eq.${username},to_user.eq.${friend}),and(from_user.eq.${friend},to_user.eq.${username})`
    )
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  renderMessages(data);
}

function renderMessages(messages){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if(!messages || messages.length === 0){
    chat.innerHTML = '<div class="small">Пока сообщений нет. Напиши первым.</div>';
    return;
  }

  messages.forEach(addMessageToChat);
  chat.scrollTop = chat.scrollHeight;
}

function addMessageToChat(item){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg";

  if(item.from_user === username){
    div.classList.add("me");
  }

  div.innerHTML = `
    <div class="name">${escapeHtml(item.from_user)}</div>
    <div>${escapeHtml(item.messages)}</div>
    <div class="time">${new Date(item.created_at).toLocaleString()}</div>
  `;

  chat.appendChild(div);
}

function handleEnter(event){
  if(event.key === "Enter"){
    sendPrivateMessage();
  }
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
