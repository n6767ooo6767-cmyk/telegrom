<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegrom V1.25 Settings</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
:root{
  --bg:#0b1020;
  --panel:#151b33;
  --sidebar:#111827;
  --chat:#0b1020;
  --card:#1d2747;
  --card-hover:#26345f;
  --active:#075985;
  --text:#ffffff;
  --muted:#9ca3af;
  --border:#25304d;
  --accent:#38bdf8;
  --button:#38bdf8;
  --button-text:#06111f;
  --input-bg:#ffffff;
  --input-text:#111111;
}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:1100px;margin:auto;height:100vh;display:flex;flex-direction:column}
.header{padding:18px;background:var(--panel);font-size:24px;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.small{font-size:13px;color:var(--muted)}
.auth{max-width:420px;margin:40px auto;padding:24px;background:var(--panel);border-radius:18px}
.auth h2{margin-top:0}
input,select{width:100%;padding:14px;font-size:16px;border-radius:12px;border:0;margin-top:10px;background:var(--input-bg);color:var(--input-text)}
button{margin-top:10px;padding:13px 18px;border:0;border-radius:12px;font-weight:bold;cursor:pointer;background:var(--button);color:var(--button-text)}
button.secondary{background:#334155;color:var(--text)}
button.danger{background:#ef4444;color:var(--text)}
button.mini{margin:0 0 0 6px;padding:5px 8px;font-size:11px;border-radius:8px;background:#334155;color:var(--text)}
.main{flex:1;display:none;overflow:hidden}
.sidebar{width:330px;background:var(--sidebar);border-right:1px solid var(--border);padding:14px;overflow-y:auto}
.content{flex:1;display:flex;flex-direction:column}
.search{margin:8px 0 14px}
.user{padding:11px;background:var(--card);border-radius:14px;margin-bottom:10px;cursor:pointer;display:flex;gap:10px;align-items:center}
.user:hover{background:var(--card-hover)}
.user.active{background:var(--active)}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:bold;flex:0 0 42px}
.user-main{min-width:0;flex:1}
.user-top{display:flex;justify-content:space-between;gap:8px}
.user-name{font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-preview{color:var(--muted);font-size:13px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.unread{background:#ef4444;color:var(--text);border-radius:999px;padding:2px 7px;font-size:12px;font-weight:bold}
.chat-title{padding:14px 18px;background:var(--sidebar);border-bottom:1px solid var(--border)}
.typing{color:#8aa3c7;font-size:14px;height:18px;margin-top:4px}
.chat{flex:1;overflow-y:auto;padding:20px}
.empty{color:var(--muted);padding:20px}
.msg{background:var(--card);padding:12px;border-radius:14px;margin-bottom:10px;max-width:76%}
.msg.me{margin-left:auto;background:var(--active)}
.name{color:var(--accent);font-weight:bold;margin-bottom:4px}
.msg.me .name{color:#bae6fd}
.text{white-space:pre-wrap;word-break:break-word}
.time{font-size:11px;color:var(--muted);margin-top:7px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.actions{white-space:nowrap}
.send{display:flex;gap:10px;padding:15px;background:var(--panel)}
.send input{margin:0}
.send button{margin:0}
@media(max-width:700px){
  .main{flex-direction:column}
  .sidebar{width:100%;max-height:260px;border-right:0;border-bottom:1px solid var(--border)}
}

.profile-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}
.profile-modal{
  width:100%;
  max-width:460px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px;
  box-shadow:0 20px 80px rgba(0,0,0,.45);
}
.profile-modal h2{margin:0 0 12px}
.profile-row{margin-top:12px}
.profile-row label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
.profile-preview{
  margin-top:14px;
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px;
  background:var(--sidebar);
  border-radius:14px;
}
.profile-preview .avatar{width:54px;height:54px;flex:0 0 54px}
.avatar img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}
.bio-line{
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}


.photo-message{
  max-width:280px;
  border-radius:12px;
  margin-top:6px;
  display:block;
}
.photo-btn{
  background:#334155;
  color:var(--text);
  min-width:52px;
}

</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div>💬 Telegrom <span class="small">V1.25 SETTINGS</span></div>
    <div>
      <span class="small" id="currentUserText"></span>
      <button class="secondary" id="profileBtn" style="display:none" onclick="openProfile()">Профиль</button>
      <button class="secondary" id="logoutBtn" style="display:none" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="auth" id="authBox">
    <h2>Вход в Telegrom</h2>
    <input id="emailInput" type="email" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Пароль">
    <input id="nicknameInput" placeholder="Ник для регистрации, например Nikon">
    <button onclick="login()">Войти</button>
    <button class="secondary" onclick="register()">Зарегистрироваться</button>
    <div class="small" style="margin-top:12px">Для входа нужен email и пароль. Ник нужен только при регистрации.</div>
  </div>

  <div class="main" id="mainBox">
    <div class="sidebar">
      <h3>Диалоги</h3>
      <input class="search" id="searchInput" placeholder="Поиск..." oninput="renderUsersFromCache()">
      <div id="usersList"></div>
    </div>

    <div class="content">
      <div class="chat-title">
        <div id="chatTitle">Выбери пользователя слева</div>
        <div id="typingStatus" class="typing"></div>
      </div>

      <div class="chat" id="chat">
        <div class="empty">Личная переписка появится здесь.</div>
      </div>

      <div class="send" id="sendBox" style="display:none;">
        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="sendPhotoMessage(event)">
        <button class="photo-btn" onclick="document.getElementById('photoInput').click()">📷</button>
        <input id="messageInput" placeholder="Сообщение..." onkeydown="handleEnter(event)">
        <button onclick="sendPrivateMessage()">Send</button>
      </div>
    </div>
  </div>
</div>


<div class="profile-backdrop" id="profileBackdrop">
  <div class="profile-modal">
    <h2>Мой профиль</h2>

    <div class="profile-row">
      <label>Ник</label>
      <input id="profileUsername" placeholder="Например: Nikon">
    </div>

    <div class="profile-row">
      <label>Статус / bio</label>
      <input id="profileBio" placeholder="Например: строю Telegrom">
    </div>

    <div class="profile-row">
      <label>Ссылка на аватарку</label>
      <input id="profileAvatar" placeholder="https://.../avatar.png" oninput="updateProfilePreview()">
    </div>

    <div class="profile-row">
      <label>Тема</label>
      <select id="profileTheme" onchange="applyTheme(this.value)">
        <option value="dark">🌙 Dark</option>
        <option value="light">☀️ Light</option>
        <option value="gold">🟡 Gold</option>
      </select>
    </div>

    <div class="profile-preview">
      <div class="avatar" id="profilePreviewAvatar">TG</div>
      <div>
        <div id="profilePreviewName" style="font-weight:bold">username</div>
        <div class="small" id="profilePreviewBio">bio</div>
      </div>
    </div>

    <button onclick="saveProfile()">Сохранить</button>
    <button class="secondary" onclick="closeProfile()">Закрыть</button>
  </div>
</div>


<script>
const db = window.supabase.createClient(
  "https://xflrmkcashrosgmsyxeg.supabase.co",
  "sb_publishable_AAUgqla1G4Xi4N0vk2B9jw_Eg-yj1Jm"
);

let currentUser = null;
let username = null;
let friend = localStorage.getItem("telegrom_friend");

let usersTimer = null;
let messagesTimer = null;
let onlineTimer = null;
let typingCooldown = false;

let usersCache = [];
let unreadCache = {};
let lastMessagesCache = {};
let currentTheme = "dark";

const THEME_VALUES = {
  dark: {
    bg:"#0b1020", panel:"#151b33", sidebar:"#111827", chat:"#0b1020",
    card:"#1d2747", cardHover:"#26345f", active:"#075985",
    text:"#ffffff", muted:"#9ca3af", border:"#25304d",
    accent:"#38bdf8", button:"#38bdf8", buttonText:"#06111f",
    inputBg:"#ffffff", inputText:"#111111"
  },
  light: {
    bg:"#eef2f7", panel:"#ffffff", sidebar:"#f8fafc", chat:"#eef2f7",
    card:"#ffffff", cardHover:"#e2e8f0", active:"#dbeafe",
    text:"#0f172a", muted:"#64748b", border:"#cbd5e1",
    accent:"#2563eb", button:"#2563eb", buttonText:"#ffffff",
    inputBg:"#ffffff", inputText:"#111111"
  },
  gold: {
    bg:"#120d00", panel:"#2b2106", sidebar:"#1f1804", chat:"#120d00",
    card:"#3a2c08", cardHover:"#4b3a0b", active:"#8a6a05",
    text:"#fff7d6", muted:"#d6b85b", border:"#5f4809",
    accent:"#facc15", button:"#facc15", buttonText:"#1f1600",
    inputBg:"#fff8d8", inputText:"#1f1600"
  }
};

applyTheme(localStorage.getItem("telegrom_theme") || "dark");
init();

document.addEventListener("DOMContentLoaded", () => {
  const messageInput = document.getElementById("messageInput");
  if(messageInput){
    messageInput.addEventListener("input", updateTyping);
  }
});


function applyTheme(theme){
  const t = THEME_VALUES[theme] || THEME_VALUES.dark;
  currentTheme = theme;

  const root = document.documentElement;
  root.style.setProperty("--bg", t.bg);
  root.style.setProperty("--panel", t.panel);
  root.style.setProperty("--sidebar", t.sidebar);
  root.style.setProperty("--chat", t.chat);
  root.style.setProperty("--card", t.card);
  root.style.setProperty("--card-hover", t.cardHover);
  root.style.setProperty("--active", t.active);
  root.style.setProperty("--text", t.text);
  root.style.setProperty("--muted", t.muted);
  root.style.setProperty("--border", t.border);
  root.style.setProperty("--accent", t.accent);
  root.style.setProperty("--button", t.button);
  root.style.setProperty("--button-text", t.buttonText);
  root.style.setProperty("--input-bg", t.inputBg);
  root.style.setProperty("--input-text", t.inputText);

  localStorage.setItem("telegrom_theme", theme);

  const select = document.getElementById("profileTheme");
  if(select){
    select.value = theme;
  }
}

async function loadThemeFromSettings(){
  if(!username) return;

  const { data, error } = await db
    .from("telegrom_settings")
    .select("*")
    .eq("username", username)
    .limit(1);

  if(error){
    console.error("Ошибка загрузки темы:", error);
    applyTheme(localStorage.getItem("telegrom_theme") || "dark");
    return;
  }

  if(data && data.length > 0 && data[0].theme){
    applyTheme(data[0].theme);
    return;
  }

  applyTheme(localStorage.getItem("telegrom_theme") || "dark");
}

async function saveThemeToSettings(theme){
  if(!username) return;

  const { data, error } = await db
    .from("telegrom_settings")
    .select("*")
    .eq("username", username)
    .limit(1);

  if(error){
    console.error("Ошибка проверки темы:", error);
    return;
  }

  if(!data || data.length === 0){
    const { error: insertError } = await db
      .from("telegrom_settings")
      .insert([{ username: username, theme: theme }]);

    if(insertError){
      console.error("Ошибка создания темы:", insertError);
    }

    return;
  }

  const { error: updateError } = await db
    .from("telegrom_settings")
    .update({ theme: theme })
    .eq("username", username);

  if(updateError){
    console.error("Ошибка сохранения темы:", updateError);
  }
}


async function init(){
  const { data } = await db.auth.getSession();

  if(data.session && data.session.user){
    currentUser = data.session.user;
    username = await getOrCreateUsername(currentUser);
    startApp();
  }
}

async function register(){
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value.trim();
  const nickname = document.getElementById("nicknameInput").value.trim();

  if(!email || !password){
    alert("Введи email и пароль");
    return;
  }

  if(!isGoodUsername(nickname)){
    alert("Ник должен быть минимум 2 буквы и не только цифры");
    return;
  }

  const { data, error } = await db.auth.signUp({
    email: email,
    password: password,
    options: {
      data: {
        username: nickname
      }
    }
  });

  if(error){
    alert("Ошибка регистрации: " + error.message);
    console.error(error);
    return;
  }

  if(data.user){
    currentUser = data.user;
    username = nickname;

    localStorage.setItem("telegrom_username", username);
    localStorage.removeItem("telegrom_friend");

    await saveOrUpdateUser();
    startApp();
  }else{
    alert("Проверь email для подтверждения регистрации");
  }
}

async function login(){
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value.trim();

  if(!email || !password){
    alert("Введи email и пароль");
    return;
  }

  const { data, error } = await db.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    alert("Ошибка входа: " + error.message);
    console.error(error);
    return;
  }

  currentUser = data.user;
  username = await getOrCreateUsername(currentUser);
  startApp();
}

async function logout(){
  await db.auth.signOut();
  localStorage.removeItem("telegrom_username");
  localStorage.removeItem("telegrom_friend");
  location.reload();
}

async function getOrCreateUsername(user){
  const metaName = user.user_metadata && user.user_metadata.username;
  const fallback = user.email ? user.email.split("@")[0] : "user";
  const name = metaName || fallback;

  localStorage.setItem("telegrom_username", name);
  username = name;

  await saveOrUpdateUser();

  return name;
}

function isGoodUsername(name){
  if(!name) return false;
  if(name.length < 2) return false;
  if(/^\\d+$/.test(name)) return false;
  return true;
}

async function saveOrUpdateUser(){
  if(!username) return;

  const now = new Date().toISOString();

  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .eq("username", username);

  if(error){
    console.error(error);
    return;
  }

  if(!data || data.length === 0){
    await db.from("telegrom_users")
      .insert([{ username: username, last_seen: now, bio: "", avatar: "" }]);
    return;
  }

  await db.from("telegrom_users")
    .update({ last_seen: now })
    .eq("username", username);
}

async function startApp(){
  document.getElementById("authBox").style.display = "none";
  document.getElementById("mainBox").style.display = "flex";
  document.getElementById("logoutBtn").style.display = "inline-block";
  document.getElementById("profileBtn").style.display = "inline-block";
  document.getElementById("currentUserText").textContent = "Ты: " + username + " ";

  await saveOrUpdateUser();
  await loadThemeFromSettings();
  await loadUsers();

  if(!usersTimer){
    usersTimer = setInterval(loadUsers, 4000);
  }

  if(!onlineTimer){
    onlineTimer = setInterval(saveOrUpdateUser, 10000);
  }

  if(friend){
    openChat(friend);
  }
}

async function getUnreadCounts(){
  if(!username) return {};

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("from_user")
    .eq("to_user", username)
    .eq("unread", true);

  if(error){
    console.error(error);
    return {};
  }

  const counts = {};
  (data || []).forEach(msg => {
    counts[msg.from_user] = (counts[msg.from_user] || 0) + 1;
  });

  return counts;
}

async function getLastMessages(){
  if(!username) return {};

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("*")
    .or(`from_user.eq.${username},to_user.eq.${username}`)
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    return {};
  }

  const latest = {};

  (data || []).forEach(msg => {
    const other = msg.from_user === username ? msg.to_user : msg.from_user;
    if(!latest[other]){
      latest[other] = msg;
    }
  });

  return latest;
}

async function loadUsers(){
  unreadCache = await getUnreadCounts();
  lastMessagesCache = await getLastMessages();

  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .order("username", { ascending:true });

  if(error){
    console.error(error);
    return;
  }

  usersCache = data || [];
  renderUsersFromCache();
}

function renderUsersFromCache(){
  const list = document.getElementById("usersList");
  const search = (document.getElementById("searchInput")?.value || "").toLowerCase().trim();

  list.innerHTML = "";

  let filtered = usersCache.filter(user => {
    return user.username && user.username !== username && isGoodUsername(user.username);
  });

  if(search){
    filtered = filtered.filter(user => user.username.toLowerCase().includes(search));
  }

  filtered.sort((a,b) => {
    const ma = lastMessagesCache[a.username];
    const mb = lastMessagesCache[b.username];
    const ta = ma ? new Date(ma.created_at).getTime() : 0;
    const tb = mb ? new Date(mb.created_at).getTime() : 0;
    return tb - ta;
  });

  if(filtered.length === 0){
    list.innerHTML = '<div class="small">Пользователей нет.</div>';
    return;
  }

  filtered.forEach(user => {
    const last = lastMessagesCache[user.username];
    const count = unreadCache[user.username] || 0;

    const div = document.createElement("div");
    div.className = "user";
    if(user.username === friend) div.classList.add("active");

    const avatar = createAvatar(user.username, user.avatar);

    const main = document.createElement("div");
    main.className = "user-main";

    const top = document.createElement("div");
    top.className = "user-top";

    const name = document.createElement("div");
    name.className = "user-name";
    name.textContent = user.username;

    const time = document.createElement("div");
    time.className = "small";
    time.textContent = last ? formatShortTime(last.created_at) : "";

    top.appendChild(name);
    top.appendChild(time);

    const preview = document.createElement("div");
    preview.className = "user-preview";
    preview.textContent = last ? previewMessage(last) : (user.bio || "Нет сообщений");

    main.appendChild(top);
    main.appendChild(preview);

    const right = document.createElement("div");
    right.className = "user-right";

    if(count > 0){
      const badge = document.createElement("span");
      badge.className = "unread";
      badge.textContent = count;
      right.appendChild(badge);
    }

    const status = document.createElement("span");
    status.textContent = isOnline(user.last_seen) ? "🟢" : "⚫";
    right.appendChild(status);

    div.appendChild(avatar);
    div.appendChild(main);
    div.appendChild(right);

    div.onclick = () => openChat(user.username);
    list.appendChild(div);
  });
}

function getInitials(name){
  return String(name).slice(0,2).toUpperCase();
}

function createAvatar(name, avatarUrl){
  const avatar = document.createElement("div");
  avatar.className = "avatar";

  if(avatarUrl && /^https?:\/\//i.test(avatarUrl)){
    const img = document.createElement("img");
    img.src = avatarUrl;
    img.alt = name;
    img.onerror = () => {
      avatar.innerHTML = "";
      avatar.textContent = getInitials(name);
    };
    avatar.appendChild(img);
  }else{
    avatar.textContent = getInitials(name);
  }

  return avatar;
}

function previewMessage(msg){
  const prefix = msg.from_user === username ? "Вы: " : "";
  return prefix + (msg.messages || "");
}

function formatShortTime(value){
  const date = new Date(value);
  return date.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function isOnline(lastSeen){
  if(!lastSeen) return false;
  const diff = Date.now() - new Date(lastSeen).getTime();
  return diff < 30000;
}

async function openChat(selectedUser){
  friend = selectedUser;
  localStorage.setItem("telegrom_friend", friend);

  document.getElementById("chatTitle").textContent = "Личный чат: " + username + " ↔ " + friend;
  document.getElementById("typingStatus").textContent = "";
  document.getElementById("sendBox").style.display = "flex";

  await markMessagesAsRead();
  await loadUsers();
  await loadPrivateMessages();
  await checkTyping();

  if(messagesTimer){
    clearInterval(messagesTimer);
  }

  messagesTimer = setInterval(async () => {
    await markMessagesAsRead();
    await loadUsers();
    await loadPrivateMessages();
    await checkTyping();
  }, 2500);
}

async function markMessagesAsRead(){
  if(!username || !friend) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .update({ unread:false })
    .eq("from_user", friend)
    .eq("to_user", username)
    .eq("unread", true);

  if(error){
    console.error(error);
  }
}

async function updateTyping(){
  if(!username || !friend) return;
  if(typingCooldown) return;

  typingCooldown = true;
  setTimeout(() => { typingCooldown = false; }, 1200);

  const now = new Date().toISOString();

  const { data, error } = await db
    .from("telegrom_typing")
    .select("*")
    .eq("from_user", username)
    .eq("to_user", friend);

  if(error){
    console.error(error);
    return;
  }

  if(!data || data.length === 0){
    const { error: insertError } = await db
      .from("telegrom_typing")
      .insert([{ from_user:username, to_user:friend, last_typing:now }]);

    if(insertError) console.error(insertError);
    return;
  }

  const { error: updateError } = await db
    .from("telegrom_typing")
    .update({ last_typing:now })
    .eq("from_user", username)
    .eq("to_user", friend);

  if(updateError) console.error(updateError);
}

async function checkTyping(){
  if(!username || !friend) return;

  const el = document.getElementById("typingStatus");

  const { data, error } = await db
    .from("telegrom_typing")
    .select("*")
    .eq("from_user", friend)
    .eq("to_user", username)
    .order("last_typing", { ascending:false })
    .limit(1);

  if(error){
    console.error(error);
    el.textContent = "";
    return;
  }

  if(!data || data.length === 0){
    el.textContent = "";
    return;
  }

  const diff = Date.now() - new Date(data[0].last_typing).getTime();
  el.textContent = diff < 5000 ? friend + " печатает..." : "";
}


async function sendPhotoMessage(event){
  const file = event.target.files && event.target.files[0];

  if(!friend){
    alert("Сначала выбери пользователя");
    event.target.value = "";
    return;
  }

  if(!file){
    return;
  }

  if(!file.type.startsWith("image/")){
    alert("Можно отправлять только изображения");
    event.target.value = "";
    return;
  }

  const ext = file.name.split(".").pop() || "jpg";
  const safeName = Date.now() + "_" + Math.random().toString(36).slice(2) + "." + ext;
  const path = username + "/" + safeName;

  const { error: uploadError } = await db.storage
    .from("chat-images")
    .upload(path, file, {
      cacheControl: "3600",
      upsert: false
    });

  if(uploadError){
    alert("Ошибка загрузки фото: " + uploadError.message);
    console.error(uploadError);
    event.target.value = "";
    return;
  }

  const { data } = db.storage
    .from("chat-images")
    .getPublicUrl(path);

  const publicUrl = data.publicUrl;

  const { error } = await db
    .from("telegrom_private_messages")
    .insert([{
      from_user: username,
      to_user: friend,
      messages: "[photo]" + publicUrl,
      unread: true,
      is_read: false
    }]);

  if(error){
    alert("Ошибка отправки фото: " + error.message);
    console.error(error);
    event.target.value = "";
    return;
  }

  event.target.value = "";

  await loadPrivateMessages();
  await loadUsers();
}

async function sendPrivateMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!friend){
    alert("Сначала выбери пользователя");
    return;
  }

  if(!text) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .insert([{ from_user:username, to_user:friend, messages:text, unread:true, is_read:false }]);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  input.value = "";
  await loadPrivateMessages();
  await loadUsers();
}

async function loadPrivateMessages(){
  if(!username || !friend) return;

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("*")
    .or(`and(from_user.eq.${username},to_user.eq.${friend}),and(from_user.eq.${friend},to_user.eq.${username})`)
    .order("created_at", { ascending:true });

  if(error){
    console.error(error);
    return;
  }

  renderMessages(data || []);
}

function renderMessages(messages){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if(!messages || messages.length === 0){
    chat.innerHTML = '<div class="empty">Пока сообщений нет. Напиши первым.</div>';
    return;
  }

  messages.forEach(addMessageToChat);
  chat.scrollTop = chat.scrollHeight;
}

function addMessageToChat(item){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";

  if(item.from_user === username) div.classList.add("me");

  const actions = item.from_user === username
    ? `<span class="actions">
        <button class="mini" onclick="editMessage(${item.id}, '${escapeAttr(item.messages)}')">Edit</button>
        <button class="mini danger" onclick="deleteMessage(${item.id})">Delete</button>
      </span>`
    : "";

  const body = renderMessageBody(item.messages);

  div.innerHTML = `
    <div class="name">${escapeHtml(item.from_user)}</div>
    ${body}
    <div class="time">
      <span>${new Date(item.created_at).toLocaleString()}</span>
      ${actions}
    </div>
  `;

  chat.appendChild(div);
}

function renderMessageBody(message){
  const text = String(message || "");

  if(text.startsWith("[photo]")){
    const url = text.replace("[photo]", "").trim();

    return `
      <div class="text">📷 Фото</div>
      <img class="photo-message" src="${escapeHtml(url)}" alt="photo">
    `;
  }

  return `<div class="text">${escapeHtml(text)}</div>`;
}

async function editMessage(id, oldText){
  const next = prompt("Новый текст:", oldText);
  if(next === null) return;

  const text = next.trim();
  if(!text) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .update({ messages:text })
    .eq("id", id)
    .eq("from_user", username);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  await loadPrivateMessages();
  await loadUsers();
}

async function deleteMessage(id){
  if(!confirm("Удалить сообщение?")) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .update({ messages:"Сообщение удалено", unread:false })
    .eq("id", id)
    .eq("from_user", username);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  await loadPrivateMessages();
  await loadUsers();
}


async function openProfile(){
  if(!username) return;

  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .eq("username", username)
    .limit(1);

  if(error){
    alert("Ошибка профиля: " + error.message);
    console.error(error);
    return;
  }

  const profile = data && data.length ? data[0] : {};

  document.getElementById("profileUsername").value = username;
  document.getElementById("profileBio").value = profile.bio || "";
  document.getElementById("profileAvatar").value = profile.avatar || "";
  document.getElementById("profileTheme").value = currentTheme || "dark";

  updateProfilePreview();
  document.getElementById("profileBackdrop").style.display = "flex";
}

function closeProfile(){
  document.getElementById("profileBackdrop").style.display = "none";
}

function updateProfilePreview(){
  const name = document.getElementById("profileUsername").value.trim() || username || "TG";
  const bio = document.getElementById("profileBio").value.trim() || "без статуса";
  const avatarUrl = document.getElementById("profileAvatar").value.trim();

  document.getElementById("profilePreviewName").textContent = name;
  document.getElementById("profilePreviewBio").textContent = bio;

  const holder = document.getElementById("profilePreviewAvatar");
  holder.innerHTML = "";

  const avatar = createAvatar(name, avatarUrl);
  holder.replaceWith(avatar);
  avatar.id = "profilePreviewAvatar";
}

async function saveProfile(){
  const newUsername = document.getElementById("profileUsername").value.trim();
  const bio = document.getElementById("profileBio").value.trim();
  const avatar = document.getElementById("profileAvatar").value.trim();
  const selectedTheme = document.getElementById("profileTheme").value || "dark";

  if(!isGoodUsername(newUsername)){
    alert("Ник должен быть минимум 2 буквы и не только цифры");
    return;
  }

  const oldUsername = username;

  if(newUsername !== oldUsername){
    const { data: existing, error: checkError } = await db
      .from("telegrom_users")
      .select("*")
      .eq("username", newUsername);

    if(checkError){
      alert("Ошибка проверки ника: " + checkError.message);
      console.error(checkError);
      return;
    }

    if(existing && existing.length > 0){
      alert("Такой ник уже занят");
      return;
    }
  }

  const { error } = await db
    .from("telegrom_users")
    .update({
      username: newUsername,
      bio: bio,
      avatar: avatar,
      last_seen: new Date().toISOString()
    })
    .eq("username", oldUsername);

  if(error){
    alert("Ошибка сохранения профиля: " + error.message);
    console.error(error);
    return;
  }

  if(newUsername !== oldUsername){
    await db.from("telegrom_private_messages").update({ from_user: newUsername }).eq("from_user", oldUsername);
    await db.from("telegrom_private_messages").update({ to_user: newUsername }).eq("to_user", oldUsername);
    await db.from("telegrom_typing").update({ from_user: newUsername }).eq("from_user", oldUsername);
    await db.from("telegrom_typing").update({ to_user: newUsername }).eq("to_user", oldUsername);
    await db.from("telegrom_settings").update({ username: newUsername }).eq("username", oldUsername);

    const { error: authError } = await db.auth.updateUser({
      data: { username: newUsername }
    });

    if(authError){
      console.error(authError);
    }

    username = newUsername;
    localStorage.setItem("telegrom_username", username);
  }

  applyTheme(selectedTheme);
  await saveThemeToSettings(selectedTheme);

  document.getElementById("currentUserText").textContent = "Ты: " + username + " ";
  closeProfile();
  await loadUsers();

  if(friend){
    await loadPrivateMessages();
  }
}

function handleEnter(event){
  if(event.key === "Enter") sendPrivateMessage();
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeAttr(text){
  return String(text)
    .replaceAll("\\","\\\\")
    .replaceAll("'","&#039;")
    .replaceAll('"',"&quot;")
    .replaceAll("\\n"," ");
}
