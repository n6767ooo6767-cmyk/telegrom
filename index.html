<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegrom v0.6</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b1020;color:white;}
.app{max-width:1000px;margin:auto;height:100vh;display:flex;flex-direction:column;}
.header{padding:18px;background:#151b33;font-size:24px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;}
.small{font-size:13px;color:#9ca3af;}
.login{padding:20px;}
.main{flex:1;display:none;overflow:hidden;}
.sidebar{width:290px;background:#111827;border-right:1px solid #25304d;padding:15px;overflow-y:auto;}
.content{flex:1;display:flex;flex-direction:column;}
input{width:100%;padding:14px;font-size:16px;border-radius:12px;border:0;margin-top:10px;box-sizing:border-box;}
button{margin-top:10px;padding:14px 20px;border:0;border-radius:12px;font-weight:bold;cursor:pointer;background:#38bdf8;}
button.secondary{background:#334155;color:white;}
.user{padding:12px;background:#1d2747;border-radius:12px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.user:hover{background:#26345f;}
.user.active{background:#075985;}
.user-left{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-right{display:flex;align-items:center;gap:6px;}
.unread{background:#ef4444;color:white;border-radius:999px;padding:2px 7px;font-size:12px;font-weight:bold;min-width:14px;text-align:center;}
.status{font-size:13px;}
.chat-title{padding:15px 20px;background:#111827;}
.chat{flex:1;overflow-y:auto;padding:20px;}
.empty{color:#9ca3af;padding:20px;}
.msg{background:#1d2747;padding:12px;border-radius:14px;margin-bottom:10px;max-width:75%;}
.msg.me{margin-left:auto;background:#075985;}
.name{color:#38bdf8;font-weight:bold;margin-bottom:4px;}
.msg.me .name{color:#bae6fd;}
.time{font-size:11px;color:#9ca3af;margin-top:6px;}
.send{display:flex;gap:10px;padding:15px;background:#151b33;}
.send input{margin:0;}
.send button{margin:0;}
@media(max-width:700px){
  .main{flex-direction:column;}
  .sidebar{width:100%;max-height:220px;border-right:0;border-bottom:1px solid #25304d;}
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div>💬 Telegrom</div>
    <div class="small" id="currentUserText"></div>
  </div>

  <div class="login" id="loginBox">
    <h2>Введи свой ник</h2>
    <input id="usernameInput" placeholder="Например: nikon">
    <button onclick="saveUsername()">Войти</button>
  </div>

  <div class="main" id="mainBox">
    <div class="sidebar">
      <h3>Пользователи</h3>
      <div id="usersList"></div>
      <button class="secondary" onclick="changeUsername()">Сменить ник</button>
    </div>

    <div class="content">
      <div class="chat-title" id="chatTitle">Выбери пользователя слева</div>
      <div class="chat" id="chat">
        <div class="empty">Личная переписка появится здесь.</div>
      </div>
      <div class="send" id="sendBox" style="display:none;">
        <input id="messageInput" placeholder="Сообщение..." onkeydown="handleEnter(event)">
        <button onclick="sendPrivateMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
const db = window.supabase.createClient(
  "https://xflrmkcashrosgmsyxeg.supabase.co",
  "sb_publishable_AAUgqla1G4Xi4N0vk2B9jw_Eg-yj1Jm"
);

let username = localStorage.getItem("telegrom_username");
let friend = localStorage.getItem("telegrom_friend");

let usersTimer = null;
let messagesTimer = null;
let onlineTimer = null;

if(username){
  startApp();
}

async function saveUsername(){
  const input = document.getElementById("usernameInput");
  const value = input.value.trim();

  if(!isGoodUsername(value)){
    alert("Ник должен быть минимум 2 буквы и не только цифры");
    return;
  }

  username = value;
  localStorage.setItem("telegrom_username", username);

  await saveOrUpdateUser();
  startApp();
}

function isGoodUsername(name){
  if(!name) return false;
  if(name.length < 2) return false;
  if(/^\d+$/.test(name)) return false;
  return true;
}

async function saveOrUpdateUser(){
  if(!username) return;

  const now = new Date().toISOString();

  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .eq("username", username);

  if(error){
    console.error(error);
    return;
  }

  if(!data || data.length === 0){
    await db
      .from("telegrom_users")
      .insert([{ username: username, last_seen: now }]);
    return;
  }

  await db
    .from("telegrom_users")
    .update({ last_seen: now })
    .eq("username", username);
}

async function startApp(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("mainBox").style.display = "flex";
  document.getElementById("currentUserText").textContent = "Ты: " + username;

  await saveOrUpdateUser();
  await loadUsers();

  if(!usersTimer){
    usersTimer = setInterval(loadUsers, 4000);
  }

  if(!onlineTimer){
    onlineTimer = setInterval(saveOrUpdateUser, 10000);
  }

  if(friend){
    openChat(friend);
  }
}

async function getUnreadCounts(){
  if(!username) return {};

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("from_user")
    .eq("to_user", username)
    .eq("unread", true);

  if(error){
    console.error(error);
    return {};
  }

  const counts = {};

  (data || []).forEach(msg => {
    if(!counts[msg.from_user]){
      counts[msg.from_user] = 0;
    }
    counts[msg.from_user]++;
  });

  return counts;
}

async function loadUsers(){
  const unread = await getUnreadCounts();

  const { data, error } = await db
    .from("telegrom_users")
    .select("*")
    .order("username", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  renderUsers(data || [], unread);
}

function renderUsers(users, unread = {}){
  const list = document.getElementById("usersList");
  list.innerHTML = "";

  const filtered = users.filter(user => {
    return user.username && user.username !== username && isGoodUsername(user.username);
  });

  if(filtered.length === 0){
    list.innerHTML = '<div class="small">Пока других пользователей нет.</div>';
    return;
  }

  filtered.forEach(user => {
    const div = document.createElement("div");
    div.className = "user";

    if(user.username === friend){
      div.classList.add("active");
    }

    const left = document.createElement("span");
    left.className = "user-left";
    left.textContent = "👤 " + user.username;

    const right = document.createElement("span");
    right.className = "user-right";

    const count = unread[user.username] || 0;

    if(count > 0){
      const badge = document.createElement("span");
      badge.className = "unread";
      badge.textContent = count;
      right.appendChild(badge);
    }

    const status = document.createElement("span");
    status.className = "status";
    status.textContent = isOnline(user.last_seen) ? "🟢" : "⚫";
    right.appendChild(status);

    div.appendChild(left);
    div.appendChild(right);

    div.onclick = () => openChat(user.username);
    list.appendChild(div);
  });
}

function isOnline(lastSeen){
  if(!lastSeen) return false;
  const diff = Date.now() - new Date(lastSeen).getTime();
  return diff < 30000;
}

async function openChat(selectedUser){
  friend = selectedUser;
  localStorage.setItem("telegrom_friend", friend);

  document.getElementById("chatTitle").textContent =
    "Личный чат: " + username + " ↔ " + friend;

  document.getElementById("sendBox").style.display = "flex";

  await markMessagesAsRead();
  await loadUsers();
  await loadPrivateMessages();

  if(messagesTimer){
    clearInterval(messagesTimer);
  }

  messagesTimer = setInterval(async () => {
    await markMessagesAsRead();
    await loadUsers();
    await loadPrivateMessages();
  }, 3000);
}

async function markMessagesAsRead(){
  if(!username || !friend) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .update({
      unread: false
    })
    .eq("from_user", friend)
    .eq("to_user", username);

  if(error){
    console.error("Ошибка markMessagesAsRead:", error);
  }
}
  
async function sendPrivateMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!friend){
    alert("Сначала выбери пользователя");
    return;
  }

  if(!text) return;

  const { error } = await db
    .from("telegrom_private_messages")
    .insert([
      {
        from_user: username,
        to_user: friend,
        messages: text,
        unread: true,
        is_read: false
      }
    ]);

  if(error){
    alert("Ошибка: " + error.message);
    console.error(error);
    return;
  }

  input.value = "";
  await loadPrivateMessages();
  await loadUsers();
}

async function loadPrivateMessages(){
  if(!username || !friend) return;

  const { data, error } = await db
    .from("telegrom_private_messages")
    .select("*")
    .or(
      `and(from_user.eq.${username},to_user.eq.${friend}),and(from_user.eq.${friend},to_user.eq.${username})`
    )
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  renderMessages(data || []);
}

function renderMessages(messages){
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  if(!messages || messages.length === 0){
    chat.innerHTML = '<div class="empty">Пока сообщений нет. Напиши первым.</div>';
    return;
  }

  messages.forEach(addMessageToChat);
  chat.scrollTop = chat.scrollHeight;
}

function addMessageToChat(item){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";

  if(item.from_user === username){
    div.classList.add("me");
  }

  div.innerHTML = `
    <div class="name">${escapeHtml(item.from_user)}</div>
    <div>${escapeHtml(item.messages)}</div>
    <div class="time">${new Date(item.created_at).toLocaleString()}</div>
  `;

  chat.appendChild(div);
}

function changeUsername(){
  localStorage.removeItem("telegrom_username");
  localStorage.removeItem("telegrom_friend");
  location.reload();
}

function handleEnter(event){
  if(event.key === "Enter"){
    sendPrivateMessage();
  }
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>
